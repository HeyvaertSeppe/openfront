name: Deploy Frontend to Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_WS_BASE_URL: openfront-web.onrender.com
      VITE_API_BASE_URL: https://openfront-web.onrender.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm run inst

      - run: npm run build-prod
        env:
          VITE_WS_BASE_URL: openfront-web.onrender.com
          VITE_API_BASE_URL: https://openfront-web.onrender.com

      - uses: actions/upload-pages-artifact@v3
        with:
          path: static

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
