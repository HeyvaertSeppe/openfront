services:
  openfront:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openfront
    restart: unless-stopped
    ports:
      - "6000:3000"
      - "6001-6020:3001-3020"
    environment:
      - GAME_ENV=prod
      - DOMAIN=localhost
      - NODE_ENV=production
      - NUM_WORKERS=2
      - INSTANCE_ID=ubuntu-prod-01
      - TURNSTILE_SITE_KEY=1x00000000000000000000AA
      - API_DOMAIN=http://localhost:3000
    volumes:
      - openfront-data:/tmp/openfront-data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/public_lobbies', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

volumes:
  openfront-data:
